<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIP IT — A UX Designer's Survival Saga</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Inter:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Playfair+Display:ital@1&display=swap');

  :root {
    --bg:             #0d0c0a;
    --surface:        #111008;
    --surface-glass:  #11100860;
    --surface-bright: #272218;
    --border:         #2c2820;
    --border-btn:     #3e3828;
    --on-surface:     #ede8dd;
    --muted:          #7e7868;   /* lifted: ~4.7:1 on bg */
    --primary:        #c9a87c;
    --on-primary:     #111008;
    --secondary:      #8fa392;
    --bad:            #cc5844;   /* lifted: ~4.8:1 on bg */
    --good:           #5d8e6a;

    @media (prefers-color-scheme: light) {
      --bg:             #FdFcFa;
      --surface:        #f2f1e8;
      --surface-glass:  #f2f1e860;
      --surface-bright: #f1ede4;
      --border:         #DcD8D080;
      --border-btn:     #CeC8D800;
      --on-surface:     #463825;
      --muted:          #827a64;   /* lifted: ~4.7:1 on bg */
      --primary:        #c78938;
      --on-primary:     #f1ede4;
      --secondary:      #66996e;

      --bad:            #cc5844;   /* lifted: ~4.8:1 on bg */
      --good:           #5d8e6a;
    }

    --mono:    'DM Mono', monospace;
    --sans:    'Inter', sans-serif;
    --display: 'Inter', sans-serif;
    --serif:   'Playfair Display', Georgia, serif;

    --space-xs:  8px;
    --space-s:  16px;
    --space-m:  32px;
    --space-l:  48px;
    --space-xl: 64px;
    --space-xxl: 96px;

    font-size: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  h1, h2, h3 {
    font-family: var(--display);
    font-weight: 400;
  }
  h1 { font-size: clamp(52px, 10vw, 88px); line-height: 0.92; }
  h2 { font-size: clamp(24px, 5vw, 36px);  line-height: 1.05; }
  h3 { font-size: 20px; line-height: 1.2; }

  body {
    background-color: var(--bg);
    color: var(--on-surface);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    overflow-x: hidden;
    overflow-anchor: none;
  }

  /* Subtle edge vignette */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    /*background: radial-gradient(ellipse at 50% 30%, transparent 55%, rgba(0,0,0,0.35) 100%);*/
    pointer-events: none;
    z-index: 100;
  }

  #game-wrapper {
    width: 100%;
    max-width: 720px;
    padding: 0 var(--space-s) var(--space-xl);
    z-index: 50;
  }

  /* ── HEADER ─────────────────────────────────────── */
  .game-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13, 12, 10, 0.38);
    background: var(--surface-glass);

    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
    padding: var(--space-l) var(--space-s) var(--space-m);
    margin: 0 calc(var(--space-s)*-1) var(--space-l);
    transition: padding 0.3s ease;
  }

  .game-eyebrow {
    font-family: var(--mono);
    font-size: 0.875rem;
    letter-spacing: 0.16em;
    color: var(--primary);
    text-transform: uppercase;
    margin-bottom: var(--space-s);
    overflow: hidden;
    max-height: 2.4em;
    opacity: 1;
    transition: max-height 0.3s ease, opacity 0.2s ease, margin 0.3s ease;
  }

  .game-title {
    font-family: var(--display);
    font-weight: 700;
    line-height: 0.92;
    letter-spacing: -0.04em;
    color: var(--on-surface);
    transition: font-size 0.3s ease;
    margin-bottom: var(--space-s);
  }
  .game-title a {
    color: var(--on-surface);
    text-decoration: none;
  }
  .game-title span {
    color: var(--primary);
  }

  .game-subtitle {
    font-family: var(--mono);
    font-size: 0.92rem;
    color: var(--muted);
    margin-bottom: var(--space-s);
    letter-spacing: 0.06em;
    overflow: hidden;
    max-height: 2.4em;
    opacity: 1;
    transition: max-height 0.3s ease, opacity 0.2s ease, margin 0.3s ease;
  }

  .game-header.scrolled {
    padding: var(--space-s) var(--space-s);
  }

  .game-header.scrolled .game-eyebrow,
  .game-header.scrolled .game-subtitle {
    max-height: 0;
    opacity: 0;
    margin-top: 0;
    margin-bottom: 0;
    padding: 0;
  }

  .game-header.scrolled .progress-track {
    margin-bottom: 0;
  }

  .game-header.scrolled .game-title {
    font-size: 1.75rem;
    letter-spacing: -0.03em;
  }

  #scroll-sentinel {
    height: 0;
    pointer-events: none;
  }

  .start-over-link {
    font-family: var(--mono);
    font-size: 0.875rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    text-decoration: underline;
    text-underline-offset: 3px;
    display: none;
    max-height: 2.4em;
  }
  .start-over-link:hover { color: var(--on-surface); }

  /* ── STATUS BAR ─────────────────────────────────── */
  .status-bar {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(min(100vw, 720px) - 32px);
    z-index: 50;
    display: flex;
    align-items: center;
    background: var(--surface-glass);
    border: 1px solid var(--border);
    border-radius: var(--space-s);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }

  .stat {
    display: flex;
    flex: 1;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px 0 13px;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }

  .stat-label {
    font-family: var(--mono);
    font-size: 0.81rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
    width: 56px;
  }

  .stat-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .stat-fill.sanity      { background: var(--secondary); }
  .stat-fill.credibility { background: var(--primary); }
  .stat-fill.caffeine    { background: var(--muted); }
  .stat-fill.deadline    { background: var(--bad); }

  .stat-value {
    font-family: var(--mono);
    font-size: 0.875rem;
    color: var(--on-surface);
    position: relative;
  }

  /* Floating +/- delta */
  .stat-delta {
    position: absolute;
    top: -2px;
    right: -22px;
    font-family: var(--mono);
    font-size: 0.875rem;
    font-weight: 500;
    pointer-events: none;
    animation: deltaFloat 1.8s ease forwards;
    white-space: nowrap;
  }
  .stat-delta.positive { color: var(--good); }
  .stat-delta.negative { color: var(--bad); }

  @keyframes deltaFloat {
    0%   { opacity: 0; transform: translateY(4px); }
    15%  { opacity: 1; transform: translateY(0); }
    70%  { opacity: 1; transform: translateY(-10px); }
    100% { opacity: 0; transform: translateY(-18px); }
  }

  .hud-spacer { height: 80px; }

  hr {
    border: none;
    height: 1px;
    background: var(--border);
    margin: 24px 0 48px;
  }

  /* ── CONSEQUENCE PANEL ──────────────────────────── */
  .consequence-panel {
    margin-top: var(--space-m);
    padding: var(--space-m);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--space-s);
    animation: fadeIn 0.35s ease;
  }

  .consequence-eyebrow {
    font-family: var(--mono);
    font-size: 0.875rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--primary);
    margin-bottom: 12px;
  }

  .consequence-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--on-surface);
    font-weight: 400;
    margin-bottom: 20px;
  }

  .consequence-deltas {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-xs);
    margin-bottom: var(--space-m);
  }

  .consequence-delta-pill {
    font-family: var(--mono);
    font-size: 0.81rem;
    padding: 3px 10px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }
  .consequence-delta-pill.pos {
    background: rgba(93, 142, 106, 0.1);
    color: var(--good);
    border: 1px solid rgba(93, 142, 106, 0.22);
  }
  .consequence-delta-pill.neg {
    background: rgba(191, 80, 64, 0.1);
    color: var(--bad);
    border: 1px solid rgba(191, 80, 64, 0.22);
  }
  .consequence-delta-pill.zero {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .continue-btn {
    display: block;
    width: 100%;
    padding: 18px 24px;
    background: var(--primary);
    color: var(--on-primary);
    border: none;
    border-radius: var(--space-xs);
    font-family: var(--mono);
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s ease;
    margin-top: var(--space-m);
  }
  .continue-btn:hover { opacity: 0.82; }

  /* ── INTRO SCREEN ───────────────────────────────── */
  .game-header.hidden { display: none; }

  .intro-screen {
    padding: var(--space-xl) 0 var(--space-xl);
    max-width: 680px;
    margin: 0 auto;
  }

  .intro-wordmark {
    font-family: var(--display);
    font-size: clamp(52px, 12vw, 96px);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--on-surface);
    margin-bottom: var(--space-s);
  }
  .intro-wordmark span { color: var(--primary); }

  .intro-tagline {
    font-family: var(--mono);
    font-size: 0.81rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: var(--space-xl);
  }

  .intro-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: var(--space-l) 0;
  }

  .intro-hook {
    font-size: 16px;
    line-height: 1.85;
    color: var(--text-body);
  }
  .intro-hook p { margin: 0 0 0.55em 0; }
  .intro-hook p:last-child { margin-bottom: 0; }

  .intro-mission {
    /*font-family: var(--serif);*/
    /*font-style: italic;*/
    font-size: clamp(19px, 3vw, 23px);
    line-height: 1.55;
    color: var(--on-surface);
    margin: var(--space-l) 0;
  }

  .intro-cast { margin: var(--space-l) 0; }

  .intro-cast-label {
    font-family: var(--mono);
    font-size: 0.81rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: var(--space-s);
  }

  .intro-cast-list { border-top: 1px solid var(--border); }

  .cast-row {
    display: flex;
    gap: var(--space-m);
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
  }
  .cast-name {
    color: var(--primary);
    font-weight: 500;
    min-width: 88px;
    flex-shrink: 0;
  }
  .cast-desc { color: var(--text-dim); }

  .intro-odds {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-dim);
    margin: var(--space-l) 0;
    padding: var(--space-m) var(--space-m);
    border: 1px solid var(--border);
    border-radius: var(--space-s);
    background: var(--surface);
  }
  .intro-odds strong {
    color: var(--bad);
    font-weight: 600;
    font-size: 17px;
  }

  .intro-start-btn {
    display: block;
    width: 100%;
    padding: 18px 24px;
    background: var(--primary);
    border-radius: var(--space-xs);
    color: var(--on-primary);
    border: none;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s ease;
    margin-top: var(--space-l);
  }
  .intro-start-btn:hover { opacity: 0.82; }

  /* ── GAME OVER ──────────────────────────────────── */
  .gameover-screen {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    animation: fadeIn 0.6s ease;
  }

  .gameover-tag {
    font-family: var(--mono);
    font-size: 0.875rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: var(--space-m);
  }
  .gameover-tag.layoff  { color: var(--bad); }
  .gameover-tag.burnout { color: var(--bad); }

  .gameover-title {
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    font-size: clamp(48px, 10vw, 84px);
    line-height: 1.0;
    letter-spacing: 0.01em;
    margin-bottom: var(--space-m);
  }
  .gameover-title.layoff  { color: var(--bad); }
  .gameover-title.burnout { color: var(--bad); }

  .gameover-body {
    font-size: 16px;
    line-height: 1.8;
    color: var(--muted);
    max-width: 560px;
    margin-bottom: 40px;
  }
  .gameover-body strong { color: var(--on-surface); font-weight: 500; }
  .gameover-body em {
    font-style: normal;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--muted);
  }

  .gameover-stat {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.875rem;
    padding: 3px 10px;
    border-radius: 3px;
    margin-bottom: var(--space-m);
  }
  .gameover-stat.layoff {
    background: rgba(191, 80, 64, 0.1);
    color: var(--bad);
    border: 1px solid rgba(191, 80, 64, 0.22);
  }
  .gameover-stat.burnout {
    background: rgba(143, 163, 146, 0.08);
    color: var(--bad);
    border: 1px solid rgba(143, 163, 146, 0.2);
  }

  .gameover-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--on-surface);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    padding: 12px 24px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.18s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    align-self: flex-start;
  }
  .gameover-btn:hover {
    border-color: var(--on-surface);
    background: var(--surface);
  }

  /* ── SCENE ──────────────────────────────────────── */
  .scene-container {
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .scene-tag {
    font-family: var(--mono);
    font-size: 0.875rem;
    letter-spacing: 0.13em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .scene-title {
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    font-size: clamp(24px, 4vw, 34px);
    line-height: 1.15;
    color: var(--on-surface);
    margin-bottom: var(--space-m);
    letter-spacing: 0.01em;
  }

  .scene-image {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--space-s);
    /*padding: var(--space-l) 0;*/
    margin-bottom: var(--space-m);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    position: relative;
    overflow: hidden;
  }
  .scene-image::after { display: none; }
  .scene-image img {
    width: 100%;
  }

  .scene-text {
    font-size: 16px;
    line-height: 1.8;
    color: var(--on-surface);
    margin-bottom: var(--space-m);
    font-weight: 300;
  }
  .scene-text p, .gameover-body p {
    margin: 0 0 1em 0;
  }
  .scene-text p:last-child, .gameover-body p:last-child {
    margin-bottom: 0;
  }
  .scene-text strong {
    color: var(--on-surface);
    font-weight: 500;
  }
  .scene-text em {
    color: var(--secondary);
    font-style: normal;
    font-family: var(--mono);
    font-size: 15px;
  }

  /* ── CHOICES ────────────────────────────────────── */
  .choices-label {
    font-family: var(--serif);
    font-size: 1.5rem;
    text-transform: capitalize;
    color: var(--muted);
    margin: var(--space-xl) 0 var(--space-m);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: var(--space-s);
  }

  .choice-btn {
    background: var(--surface-bright);
    border: 1px solid var(--border-btn);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 2px 8px rgba(0,0,0,0.13);
    border-radius: var(--space-xs);
    padding: var(--space-s) var(--space-m);
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
  }
  .choice-btn::before { display: none; }

  .choice-btn:hover {
    border-color: var(--primary);
    background: var(--surface-bright);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 4px 12px rgba(0,0,0,0.21);
  }

  .choice-letter {
    font-family: var(--mono);
    font-size: 0.875rem;
    color: var(--primary);
    letter-spacing: 0.10em;
    margin-bottom: 5px;
    display: block;
  }

  .choice-text {
    font-size: 15px;
    color: var(--on-surface);
    line-height: 1.5;
    font-weight: 300;
  }

  /* ── OUTCOME ────────────────────────────────────── */
  .outcome {
    padding: var(--space-m);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: var(--space-m);
    animation: fadeIn 0.5s ease;
  }

  .outcome-tag {
    font-family: var(--mono);
    font-size: 0.875rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .outcome-tag.win      { color: var(--good); }
  .outcome-tag.lose     { color: var(--bad); }
  .outcome-tag.continue { color: var(--secondary); }

  .outcome-title {
    font-family: var(--serif);
    font-weight: 400;
    font-style: italic;
    font-size: clamp(28px, 5vw, 42px);
    line-height: 1.15;
    margin-bottom: var(--space-s);
    letter-spacing: 0.01em;
  }

  .outcome-text {
    font-size: 15px;
    line-height: 1.75;
    color: #9e9890;
    font-weight: 300;
  }

  .outcome-btn {
    margin-top: var(--space-m);
    background: var(--primary);
    border: none;
    color: var(--bg);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    padding: 12px 24px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.18s ease;
  }
  .outcome-btn:hover {
    opacity: 0.85;
    transform: translateY(-1px);
  }

  /* ── CURSOR ─────────────────────────────────────── */
  .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--primary);
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  /* ── PROGRESS ───────────────────────────────────── */
  .progress-wrapper {
    display: flex;
    justify-content: space-between;
  }

  .progress-track {
    display: flex;
    gap: 6px;
    margin-bottom: var(--space-s);
    align-items: center;
  }

  .progress-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s ease;
  }
  .progress-dot.done    { background: var(--muted); }
  .progress-dot.current { background: var(--primary); }
  .progress-dot.future  { background: var(--border); }

  .progress-label {
    font-family: var(--mono);
    font-size: 0.875rem;
    color: var(--muted);
    letter-spacing: 0.07em;
    margin-left: 8px;
  }
</style>
</head>
<body>
<div id="game-wrapper">

  <div class="game-header">
    <!-- <div class="game-eyebrow">Interactive Fiction · UX Industry Simulator · 2026</div> -->
    <h1 class="game-title"><a href="#top">SHIP<span>IT</span></a></h1>
    <div class="game-subtitle">A CHOOSE YOUR OWN ADVENTURE FOR DESIGNERS WHO KNOW BETTER</div>


    <div class="progress-wrapper">
      <!-- PROGRESS TRACK -->

function formatText(text) {

    .split(/\n\n+/)

}

  localStorage.setItem(SAVE_KEY, JSON.stringify({ scene: sceneId, state: { ...state } }));
  const btn = document.getElementById('start-over-btn');
  if (btn) btn.style.display = 'block';
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const save = JSON.parse(raw);
    if (!save.scene || !save.state) return null;
    return save;
  } catch (e) { return null; }
}

function clearProgress() {
  localStorage.removeItem(SAVE_KEY);
  const btn = document.getElementById('start-over-btn');
  if (btn) btn.style.display = 'none';
}

// ─── SCENE INDEX ─────────────────────────────────────────────────────────────
const sceneMap = {};
scenes.forEach(s => { sceneMap[s.id] = s; });

let currentScene = null;

// ─── RENDER ──────────────────────────────────────────────────────────────────

// ─── SOUND ────────────────────────────────────────────────────────────────────
const _audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function chirp(freq) {
  const osc = _audioCtx.createOscillator();
  const gain = _audioCtx.createGain();

  const attack  = 0.008; // time to peak (seconds)
  const peakVol = 0.4; 
  const decay   = 0.06;  // time from peak to sustain level
  const susVol = 0.1;  // gain level to hold at (0–1)
  const release = 0.20;  // time to fade to silence after sustain

  osc.connect(gain);
  gain.connect(_audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, _audioCtx.currentTime);
  gain.gain.setValueAtTime(0.001, _audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(peakVol, _audioCtx.currentTime + attack);
  gain.gain.linearRampToValueAtTime(susVol, _audioCtx.currentTime + attack + decay);
  gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + attack + decay + release);
  osc.start(_audioCtx.currentTime);
  osc.stop(_audioCtx.currentTime + attack + decay + release);
}
const CHIRP_FREQS = [392.00, 311.13, 261.63]; // G4, Eb4, C4

const PROGRESSION_CHORDS = [
  [246.94, 293.66, 369.99], // Bm:  B3, D4, F#4
  [196.00, 246.94, 293.66], // G:   G3, B3, D4
  [146.83, 185.00, 220.00], // D:   D3, F#3, A3
  [220.00, 277.18, 329.63], // A:   A3, C#4, E4
];

function playOctaves(freq) {
  [freq * 0.5, freq * 0.75, freq].forEach(f => {
    const osc = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    const attack  = 0.008; // time to peak (seconds)
    const peakVol = 0.4; 
    const decay   = 0.06;  // time from peak to sustain level
    const susVol = 0.1;  // gain level to hold at (0–1)
    const release = 0.20;  // time to fade to silence after sustain

    osc.connect(gain);
    gain.connect(_audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, _audioCtx.currentTime);
    gain.gain.setValueAtTime(0.001, _audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(peakVol, _audioCtx.currentTime + attack);
    gain.gain.linearRampToValueAtTime(susVol, _audioCtx.currentTime + attack + decay);
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + attack + decay + release);
    osc.start(_audioCtx.currentTime);
    osc.stop(_audioCtx.currentTime + attack + decay + release);
  });
}

function playChord(freqs) {
  freqs.forEach(freq => {
    const osc = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.connect(gain);
    gain.connect(_audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, _audioCtx.currentTime);
    gain.gain.setValueAtTime(0.001, _audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.12, _audioCtx.currentTime + 0.18);
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + 0.9);
    osc.start(_audioCtx.currentTime);
    osc.stop(_audioCtx.currentTime + 0.9);
  });
}

let _chordIndex = 0;
function chordG4() {
  playChord(PROGRESSION_CHORDS[_chordIndex++ % PROGRESSION_CHORDS.length]);
}

function startGame() {
  _header.classList.remove('hidden');
  renderScene('ch0');
}

function renderScene(sceneId) {
  const scene = sceneMap[sceneId];
  if (!scene) return;
  currentScene = scene;

  if (sceneId === 'intro') { renderIntro(); return; }

  _header.classList.remove('hidden');
  _header.classList.add('scrolled');

  updateProgress();

  const container = document.getElementById('scene-container');

  if (scene.isEnding) {
    renderEnding(scene, container);
    return;
  }

  container.innerHTML = `
    <div class="scene-tag">${scene.tag}</div>
    <h2 class="scene-title">${scene.title}</h2>
    <div class="scene-image"><img
      src="./images/lg/${scene.image}"
      srcset="./images/sm/${scene.image} 480w, ./images/lg/${scene.image} 960w"
      sizes="(max-width: 720px) 100vw, 720px"
      alt="${scene.title}"
      loading="lazy"
    /></div>
    <div class="scene-text">${formatText(scene.text)}</div>
    <div class="choices-label">What's your move?</div>
    <div class="choices">
      ${scene.choices.map((c, i) => `
        <button class="choice-btn" onclick="handleChoice(${i})" onmouseenter="if(CHIRP_FREQS[${i}])chirp(CHIRP_FREQS[${i}])">
          <span class="choice-letter">OPTION ${c.letter}</span>
          <div class="choice-text">${c.text}</div>
        </button>
      `).join('')}
    </div>
  `;

  container.classList.remove('scene-container');
  void container.offsetWidth;
  container.classList.add('scene-container');

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderEnding(scene, container) {
  const isWin = scene.endingType === 'win';
  if (isWin) winSound();
  container.innerHTML = `
    <div class="scene-tag">${scene.tag}</div>
    <h2 class="scene-title">${scene.title}</h2>
    <div class="scene-image"><img

      srcset="./images/sm/${scene.image} 480w, ./images/lg/${scene.image} 960w"
      sizes="(max-width: 720px) 100vw, 720px"

    /></div>
    <div class="scene-text">${formatText(scene.text)}</div>

          ? `Final stats — Sanity: ${state.sanity} | Credibility: ${state.credibility} | Caffeine: ${state.caffeine}<br><br>You survived another sprint. The work shipped. Derek is already writing a new message.`
          : `Final stats — Sanity: ${state.sanity} | Credibility: ${state.credibility} | Caffeine: ${state.caffeine}<br><br>You'll be back at this desk tomorrow. The laptop will be warmer. The source files will still be missing.`
        }

}

// ─── CHOICE HANDLER ───────────────────────────────────────────────────────────
function handleChoice(index) {
  const choice = currentScene.choices[index];
  if (!choice) return;
  playOctaves(CHIRP_FREQS[index % CHIRP_FREQS.length]);

  // Disable all choice buttons immediately
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    btn.onmouseenter = null;
    btn.style.opacity = '0.4';
    btn.style.cursor = 'default';
    btn.style.transform = 'none';
  });

  // Highlight the chosen button
  const chosenBtn = document.querySelectorAll('.choice-btn')[index];
  if (chosenBtn) {
    chosenBtn.style.opacity = '1';
    chosenBtn.style.borderColor = 'var(--primary)';
    chosenBtn.style.background = 'var(--surface-bright)';
  }

  // Capture old stats for delta display
  const before = {
    sanity: state.sanity,
    credibility: state.credibility,
    caffeine: state.caffeine,
    deadline: state.deadlineProgress
  };

  // Apply effects to state
  const effects = choice.effects;
  state.sanity = Math.max(0, Math.min(100, state.sanity + (effects.sanity || 0)));
  state.credibility = Math.max(0, Math.min(100, state.credibility + (effects.credibility || 0)));
  state.caffeine = Math.max(0, Math.min(100, state.caffeine + (effects.caffeine || 0)));
  state.deadlineProgress = Math.max(0, Math.min(100, state.deadlineProgress + (effects.deadline || 0)));

  if (choice.flags) Object.assign(state.flags, choice.flags);
  state.chapter++;

  saveProgress(choice.next);

  // Update HUD bars with animation
  updateStats();

  // Animate floating deltas on the HUD stat values
  showStatDeltas(effects);

  // Check for failure BEFORE showing the consequence panel
  const failure = checkFailure();

  // Build delta pills for the consequence panel
  const statLabels = {
    sanity: 'Sanity',
    credibility: 'Credibility',
    caffeine: 'Caffeine',
    deadline: 'Deadline'
  };
  const statKeys = ['sanity', 'credibility', 'caffeine', 'deadline'];
  const afterVals = {
    sanity: state.sanity,
    credibility: state.credibility,
    caffeine: state.caffeine,
    deadline: state.deadlineProgress
  };

  const deltaPills = statKeys.map(key => {
    const delta = afterVals[key] - before[key];
    if (delta === 0) return `<span class="consequence-delta-pill zero">${statLabels[key]} unchanged</span>`;
    const sign = delta > 0 ? '+' : '';
    const cls = delta > 0 ? 'pos' : 'neg';
    return `<span class="consequence-delta-pill ${cls}">${statLabels[key]} ${sign}${delta}</span>`;
  }).join('');

  // Inject consequence panel below the choices
  const container = document.getElementById('scene-container');
  const panel = document.createElement('div');
  panel.className = 'consequence-panel';
  panel.id = 'consequence-panel';

  panel.innerHTML = `
    <div class="consequence-eyebrow">↳ What happens</div>
    <div class="consequence-text">${choice.consequence}</div>
    <div class="consequence-deltas">${deltaPills}</div>
  `;
  container.appendChild(panel);

  const btn = document.createElement('button');
  btn.id = 'continue-btn';
  btn.className = 'continue-btn' + (failure ? ' danger' : '');
  btn.textContent = failure ? 'See what happens →' : 'Continue →';
  btn.onclick = failure ? () => renderGameOver(failure) : () => { chordG4(); advanceScene(choice.next); };
  container.appendChild(btn);

  // Scroll consequence panel into view, clearing the fixed status bar
  setTimeout(() => {
    const panel = document.getElementById('continue-btn');
    const bar = document.querySelector('.status-bar');
    const gap = panel.getBoundingClientRect().bottom - (window.innerHeight - bar.offsetHeight) + 16;
    if (gap > 0) window.scrollBy({ top: gap, behavior: 'smooth' });
  }, 100);
}

function advanceScene(nextId) {
  const failure = checkFailure();
  if (failure) {
    renderGameOver(failure);
  } else {
    renderScene(nextId);
  }
}

// ─── FAILURE CHECK ────────────────────────────────────────────────────────────
function checkFailure() {
  if (state.credibility <= 0) return 'credibility';
  if (state.deadlineProgress <= 0) return 'deadline';
  if (state.sanity <= 0) return 'sanity';
  if (state.caffeine <= 0) return 'caffeine';
  return null;
}

function winSound() {
  // D major arpeggio: D3, F#3, A3, D4 — unhurried, low to high
  [146.83, 185.00, 220.00, 293.66].forEach((freq, i) => {
    const osc = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.connect(gain);
    gain.connect(_audioCtx.destination);
    osc.type = 'sine';
    const t = _audioCtx.currentTime + i * 0.22;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.linearRampToValueAtTime(0.13, t + 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
    osc.start(t);
    osc.stop(t + 1.2);
  });
}

function gameOverSound() {
  [123.47, 146.83, 185.00].forEach((freq, i) => { // Bm: B2, D3, F#3 — low, unresolved
    const osc = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.connect(gain);
    gain.connect(_audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, _audioCtx.currentTime);
    gain.gain.setValueAtTime(0.001, _audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.10 - i * 0.02, _audioCtx.currentTime + 0.6);
    gain.gain.linearRampToValueAtTime(0.08 - i * 0.02, _audioCtx.currentTime + 2.5);
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + 4.0);
    osc.start(_audioCtx.currentTime);
    osc.stop(_audioCtx.currentTime + 4.0);
  });
}

function renderGameOver(reason) {
  gameOverSound();
  const container = document.getElementById('scene-container');
  const isLayoff = reason === 'credibility' || reason === 'deadline';

  const layoffMessages = {
    credibility: {
      tag: '📧 Company-wide announcement',
      title: 'Increased\nproductivity\nthrough Ai',
      pill: 'Credibility reached zero',
      body: `An all-hands invite lands in your calendar at 4:47 PM on a Friday. The subject line is: <em>"Exciting company update."</em>

Your manager isn't on the invite.

The CEO opens with a slide titled <strong>"Designing for the Future."</strong> There is a robot on it. The robot is smiling. He explains that AI tools have made certain roles redundant — specifically roles focused on <em>"early-stage visual exploration"</em> and <em>"stakeholder-facing mockup generation."</em>

He does not say your name. He says <em>"impacted teammates"</em> three times.

Your severance is six weeks. Your laptop has a pink gradient on the left side. You are asked to return it anyway.

<strong>Derek sends you a LinkedIn connection request the same evening. The note says: "Let's stay in touch!! 🚀"</strong>`
    },
    deadline: {
      tag: '📧 Company-wide announcement',
      title: 'Increased\nproductivity\nthrough Ai',
      pill: 'Deadline reached zero',
      body: `The stakeholder review happens without your work. Someone pastes a competitor screenshot into the deck. It ships. No one notices the difference — or if they do, they don't say anything.

Two weeks later, the VP of Product sends a company-wide note about <em>"streamlining the design function."</em> There's a reference to <strong>AI-assisted ideation tools</strong> that can generate <em>"initial direction in seconds."</em>

The subtext is not subtle. The implication is you.

Your offboarding meeting is 15 minutes long. Your manager thanks you for your contributions. You ask which contributions specifically. There is a pause.

<strong>"All of them,"</strong> she says, and closes the Zoom window.`
    }
  };

  const burnoutMessages = {
    sanity: {
      tag: '✉️ Your resignation letter',
      title: 'You\nResign.',
      pill: 'Sanity reached zero',
      body: `You don't write a long letter. You write four sentences.

<em>"I am resigning effective two weeks from today. I have genuinely valued working here. I wish the team well. Please don't schedule a farewell Zoom."</em>

They schedule a farewell Zoom.

You start working three days a week at <strong>Bloom & Co.</strong>, a florist on the corner two blocks from your apartment. You water things. You trim stems at a 45-degree angle. You learn the names of flowers you didn't know existed. Customers ask you questions you can answer completely and honestly.

No one asks you to make anything look like Balenciaga.

You make $14.50 an hour. You have no health insurance. You have a window with good light and a radio that only plays one station. The station plays songs you half-remember.

<strong>It is, on balance, enough.</strong>`
    },
    caffeine: {
      tag: '✉️ Your resignation letter',
      title: 'You\nResign.',
      pill: 'Caffeine reached zero',
      body: `It happens on a Tuesday. You open your laptop, look at the Figma file, and close it again.

Not dramatically. Not with any particular feeling. You just… close it.

You sit for eleven minutes without doing anything. Then you open a new doc and type a resignation letter. The autocomplete tries to help. You turn it off.

A friend tells you her cousin's pottery studio needs someone to work the front desk and occasionally throw clay on Thursdays. <strong>You take the job.</strong> The pay is $13 an hour. There is no dental. There is a cat named Gerald who sleeps on the glazing shelf.

You stop checking Slack. After three weeks you notice your shoulders have dropped approximately two inches.

You do not miss the design system. You do not miss Derek. You miss, occasionally, the work — the real work, the thinking-through-problems work. But not enough to go back.

<strong>Gerald is a very good cat.</strong>`
    }
  };

  const data = isLayoff ? layoffMessages[reason] : burnoutMessages[reason];
  const type = isLayoff ? 'layoff' : 'burnout';

  container.innerHTML = `
    <div class="gameover-screen">
      <h2 class="gameover-title ${type}">Game Over</h2>
      <div class="gameover-stat ${type}">${data.pill}</div>
      <hr />
      <div class="gameover-tag ${type}">${data.tag}</div>
      <div class="gameover-body">${formatText(data.body)}</div>
      <button class="gameover-btn" onclick="resetGame()">Try again ↺</button>
    </div>
  `;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showStatDeltas(effects) {
  const map = {
    sanity: 'val-sanity',
    credibility: 'val-credibility',
    caffeine: 'val-caffeine',
    deadline: 'val-deadline'
  };
  Object.entries(map).forEach(([key, elId]) => {
    const delta = effects[key] || 0;
    if (delta === 0) return;
    const el = document.getElementById(elId);
    if (!el) return;
    const floater = document.createElement('span');
    floater.className = `stat-delta ${delta > 0 ? 'positive' : 'negative'}`;
    floater.textContent = (delta > 0 ? '+' : '') + delta;
    el.style.position = 'relative';
    el.appendChild(floater);
    setTimeout(() => floater.remove(), 2000);
  });
}

// ─── STATS UPDATE ─────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('bar-sanity').style.width = state.sanity + '%';
  document.getElementById('val-sanity').textContent = state.sanity;

  document.getElementById('bar-credibility').style.width = state.credibility + '%';
  document.getElementById('val-credibility').textContent = state.credibility;

  document.getElementById('bar-caffeine').style.width = state.caffeine + '%';
  document.getElementById('val-caffeine').textContent = state.caffeine;

  document.getElementById('bar-deadline').style.width = state.deadlineProgress + '%';
  document.getElementById('val-deadline').textContent = state.deadlineProgress;
}

function updateProgress() {
  const progressTrack = document.getElementById('progress-track');
  if (currentScene?.id === 'intro') {
    if (progressTrack) progressTrack.style.display = 'none';
    return;
  }
  if (progressTrack) progressTrack.style.display = 'flex';

  const chapterMap = {
    'ch0': 0, 'ch1_a': 1, 'ch1_b': 1, 'ch1_c': 1,
    'ch2': 2, 'ch3': 3, 'ch4': 4, 'ch5': 5,
    'ch6': 6, 'ch6_follow': 7,
    'ending_ship': 7, 'ending_chaos': 5,
    'ending_win': 7
  };
  const current = chapterMap[currentScene?.id] ?? 0;

  for (let i = 0; i <= 7; i++) {
    const dot = document.getElementById('dot-' + i);
    if (!dot) continue;
    if (i < current) { dot.className = 'progress-dot done'; }
    else if (i === current) { dot.className = 'progress-dot current'; }
    else { dot.className = 'progress-dot future'; }
  }

  const label = document.querySelector('.progress-label');
  if (label) label.textContent = `CHAPTER ${current + 1} OF 8`;
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function resetGame() {
  clearProgress();
  state.sanity = 65;
  state.credibility = 55;
  state.caffeine = 45;
  state.deadlineProgress = 85;
  state.chapter = 0;
  state.flags = {};
  updateStats();
  renderScene('intro');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function getChapterParam() {
  console.log('[DEBUG] href:', window.location.href);
  console.log('[DEBUG] search:', window.location.search);
  console.log('[DEBUG] hash:', window.location.hash);
  console.log('[DEBUG] known scene IDs:', Object.keys(sceneMap));

  const search = new URLSearchParams(window.location.search).get('chapter');
  console.log('[DEBUG] search param "chapter":', search);
  if (search && sceneMap[search]) return search;

  const hash = new URLSearchParams(window.location.hash.replace(/^#/, '')).get('chapter');
  console.log('[DEBUG] hash param "chapter":', hash);
  if (hash && sceneMap[hash]) return hash;

  const bare = window.location.hash.replace('#', '');
  console.log('[DEBUG] bare hash:', bare, '| match:', !!sceneMap[bare]);
  if (bare && sceneMap[bare]) return bare;

  return null;
}
// Sticky header scroll behaviour
const _header = document.querySelector('.game-header');
window.addEventListener('scroll', () => {
  if (!currentScene || currentScene.id !== 'intro') return;
  _header.classList.toggle('scrolled', window.scrollY > 0);
}, { passive: true });

const _jumpTo = getChapterParam();
console.log('[DEBUG] jumping to:', _jumpTo || 'ch0 (default)');
if (_jumpTo) {
  renderScene(_jumpTo);
} else {
  const _saved = loadProgress();
  if (_saved && sceneMap[_saved.scene]) {
    Object.assign(state, _saved.state);
    updateStats();
    const _failure = checkFailure();
    if (_failure) {
      renderGameOver(_failure);
    } else {
      const btn = document.getElementById('start-over-btn');
      if (btn) btn.style.display = 'block';
      renderScene(_saved.scene);
    }
  } else {
    renderScene('intro');
  }
}
